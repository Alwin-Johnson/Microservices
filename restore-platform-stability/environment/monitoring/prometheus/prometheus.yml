global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: orders
    static_configs:
      - targets: ["orders:8081"]

  - job_name: payments
    static_configs:
      - targets: ["payments:8082"]

  - job_name: inventory
    static_configs:
      - targets: ["inventory:8083"]
